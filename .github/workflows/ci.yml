name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Build (static binaries)
        run: |
          for svc in gateway user wallet notification chainmonitor; do
            CGO_ENABLED=0 go build -trimpath -o /dev/null ./cmd/$svc
          done

  docker:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [gateway, user, wallet, notification, chainmonitor]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: SERVICE=${{ matrix.service }}
          push: false
          tags: web3-event-platform/${{ matrix.service }}:ci
