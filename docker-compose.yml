# Local one-command stack: NATS broker + the four services behind the gateway.
# Only the gateway is published to the host; internal services talk over the
# private compose network, mirroring the "edge is public, services are private"
# topology.

services:
  nats:
    image: nats:2.10-alpine
    # -js: JetStream (durable streams); -m 8222: HTTP monitoring for healthcheck
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  user:
    build:
      context: .
      args: { SERVICE: user }
    environment:
      USER_ADDR: ":8081"
      NATS_URL: "nats://nats:4222"
      # Postgres-backed store keeps the service stateless -> horizontally scalable.
      POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/chainmonitor?sslmode=disable"
      DB_MAX_CONNS: "15" # per replica; 3 replicas x 15 = 45 < Postgres max_connections
    depends_on:
      nats: { condition: service_healthy }
      postgres: { condition: service_healthy }
    expose: ["8081"]
    deploy:
      replicas: 3 # stateless: run multiple instances behind the gateway

  wallet:
    build:
      context: .
      args: { SERVICE: wallet }
    environment:
      WALLET_ADDR: ":8082"
      NATS_URL: "nats://nats:4222"
      KEYSTORE_DIR: "/data/keystore"
      KEYSTORE_PASSPHRASE: "dev-keystore-passphrase"
      KEYSTORE_LIGHT_SCRYPT: "true" # fast key derivation for local dev
    volumes:
      - wallet-keystore:/data/keystore
    depends_on:
      nats: { condition: service_healthy }
    expose: ["8082"]

  notification:
    build:
      context: .
      args: { SERVICE: notification }
    environment:
      NOTIFICATION_ADDR: ":8083"
      NATS_URL: "nats://nats:4222"
    depends_on:
      nats: { condition: service_healthy }
    expose: ["8083"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chainmonitor
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    expose: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  margin:
    build:
      context: .
      args: { SERVICE: margin }
    environment:
      MARGIN_ADDR: ":8085"
      ETH_RPC_URL: "https://ethereum-sepolia-rpc.publicnode.com"
      # Collateral asset registry: token + Chainlink USD feed + haircut per asset.
      # Replace with real network addresses; empty registry values every account to zero.
      ASSETS_JSON: "[]"
    expose: ["8085"]
    deploy:
      replicas: 3 # stateless compute: scale out behind the gateway

  chainmonitor:
    build:
      context: .
      args: { SERVICE: chainmonitor }
    environment:
      CHAINMONITOR_ADDR: ":8084"
      NATS_URL: "nats://nats:4222"
      POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/chainmonitor?sslmode=disable"
      # Default public node follows the tip but rejects historical/log queries
      # (403 "archive request"), so sustained indexing needs a real endpoint —
      # set ETH_RPC_URL to your own Alchemy/Infura URL. The monitor degrades
      # gracefully (logs + retries) without one.
      ETH_RPC_URL: "https://ethereum-sepolia-rpc.publicnode.com"
      CONFIRMATIONS: "5"
    depends_on:
      nats: { condition: service_healthy }
      postgres: { condition: service_healthy }
    expose: ["8084"]

  gateway:
    build:
      context: .
      args: { SERVICE: gateway }
    environment:
      GATEWAY_ADDR: ":8080"
      ENV: "development"
      JWT_SECRET: "dev-insecure-secret-change-me"
      USER_URL: "http://user:8081"
      WALLET_URL: "http://wallet:8082"
      MARGIN_URL: "http://margin:8085"
      REDIS_ADDR: "redis:6379" # shared rate limiting across gateway replicas
      RATE_LIMIT_PER_MIN: "6000000" # raised so local load tests measure throughput, not the limit
      ADMIN_CLIENT_ID: "admin-client"
      ADMIN_CLIENT_SECRET: "admin-secret"
      USER_CLIENT_ID: "user-client"
      USER_CLIENT_SECRET: "user-secret"
    ports:
      - "8080:8080" # the only publicly exposed service
    depends_on:
      redis: { condition: service_healthy }
      user: { condition: service_started }
      wallet: { condition: service_started }
      notification: { condition: service_started }
      margin: { condition: service_started }

volumes:
  wallet-keystore:
  pg-data:
